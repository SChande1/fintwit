name: FinTwit Monitor - Accounts

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        default: "accounts"
        type: choice
        options:
          - accounts
          - summary

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state_accounts.json
          key: fintwit-state-accounts-${{ github.run_id }}
          restore-keys: |
            fintwit-state-accounts-
            fintwit-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          STATE_FILE: state_accounts.json
        run: |
          ACTION="${{ github.event.inputs.action || 'accounts' }}"
          python -m src "$ACTION"
